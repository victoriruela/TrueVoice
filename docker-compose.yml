services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: truevoice-api:latest
    container_name: truevoice-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist HuggingFace model cache (avoids re-downloading on restart)
      - hf_cache:/root/.cache/huggingface
      # Shared volumes for voices, outputs, and sessions
      - ./voices:/app/voices
      - ./api_outputs:/app/api_outputs
      - ./temp_outputs:/app/temp_outputs
      - ./race_sessions:/app/race_sessions
      # Full access to the Windows host filesystem for reading voice/output folders
      # Los discos se añaden dinamicamente via docker-compose.override.yml (generado por generate_drives.ps1)
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface/transformers
      # Maximizar paralelismo CPU en PyTorch/OpenMP/MKL (0 = auto para MKL/OpenBLAS)
      - MKL_NUM_THREADS=0
      - OPENBLAS_NUM_THREADS=0
      - NUMEXPR_NUM_THREADS=0
      - TOKENIZERS_PARALLELISM=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: truevoice-frontend:latest
    container_name: truevoice-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # Points frontend to the 'api' service by its Docker network name
      - API_URL=http://api:8000
      - CONFIG_DIR=/app
    volumes:
      # Config persistence
      - ./frontend_config.json:/app/frontend_config.json
      # Shared output folder so frontend can reference generated files
      - ./api_outputs:/app/api_outputs
      - ./voices:/app/voices
      - ./race_sessions:/app/race_sessions
      # Full access to the Windows host filesystem for the folder browser
      # Los discos se añaden dinamicamente via docker-compose.override.yml (generado por generate_drives.ps1)
    # Allows the container to reach services on the host (e.g. Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

volumes:
  hf_cache:
    driver: local
